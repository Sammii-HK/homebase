name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version into service worker
        env:
          SHA: ${{ github.sha }}
        run: |
          SHORT="${SHA::8}"
          sed -i "s|// Service worker.*|// Service worker — v${SHORT}|" apps/web/public/sw.js

      - name: Build Docker image
        run: docker build -t homebase:linux apps/web/

      - name: Ship image to server
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 95.217.179.111 >> ~/.ssh/known_hosts
          docker save homebase:linux | ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@95.217.179.111 \
            "docker load && \
             docker stop homebase 2>/dev/null || true && \
             docker rm homebase 2>/dev/null || true && \
             docker run -d --name homebase --restart unless-stopped \
               --network spellcast_default \
               --env-file /opt/homebase/.env \
               -v /opt/homebase/data:/app/data \
               homebase:linux"

      - name: Install cron jobs on server
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@95.217.179.111 '
            printf "%s\n" "#!/bin/bash" \
              "TOKEN=\$(grep HOMEBASE_SECRET /opt/homebase/.env | cut -d= -f2)" \
              "BASE=\"https://homebase.sammii.dev/api/cron\"" \
              "curl -sf -X POST \"\$BASE/\$1\" -H \"Authorization: Bearer \$TOKEN\" || true" \
              > /opt/homebase/cron.sh && chmod +x /opt/homebase/cron.sh
            printf "%s\n" \
              "0  7 * * *     root  /opt/homebase/cron.sh briefing" \
              "0  9 * * *     root  /opt/homebase/cron.sh auto-approve" \
              "0 15 * * *     root  /opt/homebase/cron.sh auto-approve" \
              "0  8 * * *     root  /opt/homebase/cron.sh retry-failed" \
              "*/30 * * * *   root  /opt/homebase/cron.sh push-alerts" \
              "0 20 * * *     root  /opt/homebase/cron.sh queue-check" \
              "0  9 * * *     root  /opt/homebase/cron.sh events" \
              > /etc/cron.d/homebase
          '
